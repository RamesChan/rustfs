services:
  rustfs_perms:
    image: alpine
    user: root
    volumes:
      - ./rustfs_data:/data
      - ./rustfs_logs:/logs
    command: sh -c "chown -R 10001:10001 /data /logs"
    networks:
      - prd_data_pipeline

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.98
    container_name: rustfs
    restart: unless-stopped
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY}
      RUSTFS_ADDRESS: :9000
      RUSTFS_CONSOLE_ENABLE: true
      RUSTFS_REGION: us-east-1
      RUSTFS_OBS_LOGGER_LEVEL: warn
      # RUSTFS_OBS_LOG_DIRECTORY: /logs
    volumes:
      - ./rustfs_data:/data
      - ./rustfs_logs:/logs
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health && curl -f http://localhost:9001/rustfs/console/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prd_data_pipeline


networks:
  prd_data_pipeline:
    external: true